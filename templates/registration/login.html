{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Almoxarifado Dona Inês</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/design-tokens.css' %}">
    <style type="text/tailwindcss">
        @layer base {
            input[type="text"],
            input[type="password"] {
                @apply mt-1 block w-full px-2 py-1.5 bg-white border border-gray-300 rounded shadow-sm placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-xs transition duration-150 ease-in-out;
            }
            label {
                @apply block text-[10px] font-bold text-gray-500 uppercase mb-0.5 tracking-tight;
            }
        }
        @layer components {
            .window-panel {
                border: 1px solid var(--color-border);
                background: var(--color-panel);
                box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--color-border) 30%, white), var(--shadow-sm);
                border-radius: var(--radius-md);
            }
            .window-title {
                @apply px-3 py-1 text-[12px] font-bold;
                color: var(--color-secondary);
                background: linear-gradient(to right, var(--color-title-from), var(--color-title-to));
                border-bottom: 1px solid var(--color-title-border);
            }
            .section-box {
                @apply p-3;
                background: var(--color-panel-2);
                border: 1px solid var(--color-border-soft);
                border-radius: var(--radius-sm);
            }
            .action-btn {
                @apply w-full flex items-center justify-center gap-2 px-3 py-1.5 text-[11px] font-semibold active:translate-y-px;
                border: 1px solid var(--color-action-border);
                background: linear-gradient(to bottom, var(--color-action-from), var(--color-action-to));
                color: var(--color-action-text);
                border-radius: var(--radius-sm);
                box-shadow: var(--shadow-sm);
            }
            .action-btn:hover {
                background: linear-gradient(to bottom, var(--color-action-hover-from), var(--color-action-hover-to));
            }
        }
    </style>
    <style>
        .themed-strong {
            color: var(--color-strong);
        }
        .themed-muted {
            color: var(--color-muted);
        }
        body {
            font-family: var(--font-sans);
            background: radial-gradient(circle at top right, color-mix(in srgb, var(--color-title-from) 70%, white), var(--color-bg));
        }
    </style>
</head>
<body data-theme="modern" class="min-h-screen">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="window-panel w-full max-w-md">
            <div class="window-title">Acesso ao Sistema</div>
            <div class="p-3 space-y-3">
                <div class="section-box text-center">
                    <img src="{% static 'images/logo.png' %}" alt="Brasao de Dona Ines" class="h-24 w-auto mx-auto object-contain" loading="eager">
                    <h1 class="mt-2 text-[16px] font-bold uppercase tracking-tight themed-strong">Almoxarifado</h1>
                    <p class="text-[11px] themed-muted">Prefeitura Municipal de Dona Ines</p>
                </div>

                <form method="post" class="section-box space-y-3">
                    {% csrf_token %}
                    <div>
                        <label for="id_username">Usuario</label>
                        <input type="text" name="username" id="id_username" required autocomplete="username" autofocus>
                    </div>
                    <div>
                        <label for="id_password">Senha</label>
                        <input type="password" name="password" id="id_password" required autocomplete="current-password">
                    </div>

                    {% if form.errors %}
                    <div class="p-2 bg-red-50 text-red-700 text-[11px] border border-red-200">
                        Usuario ou senha incorretos.
                    </div>
                    {% endif %}

                    <button type="submit" class="action-btn">Entrar no Sistema</button>
                </form>

                <div class="text-center text-[10px] themed-muted">
                    201075 - Prefeitura Municipal de Dona Ines
                </div>
            </div>
        </div>
    </div>
</body>
</html>
