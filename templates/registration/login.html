<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Almoxarifado Dona Inês</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900">📦 Almoxarifado</h1>
            <p class="text-gray-500 mt-2">Prefeitura Municipal de Dona Inês</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Usuário</label>
                    <input type="text" name="username" id="id_username" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">Senha</label>
                    <input type="password" name="password" id="id_password" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                </div>
            </div>

            {% if form.errors %}
            <div class="mt-4 p-2 bg-red-50 text-red-700 text-sm rounded border border-red-200">
                Usuário ou senha incorretos.
            </div>
            {% endif %}

            <button type="submit" class="w-full mt-6 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition font-semibold">
                Entrar no Sistema
            </button>
        </form>
    </div>
</body>
</html>
